<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile - UChat</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.header{
background:#1877F2;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

img{
width:120px;
height:120px;
border-radius:50%;
margin-top:20px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

button{
background:#1877F2;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
font-size:16px;
margin:10px;
}
</style>
</head>

<body>

<div class="header">
My Profile
</div>

<img src="https://placehold.co/120x120/png" id="photo">

<div class="card">
<h2 id="username">Loading...</h2>
<p id="email">Loading...</p>
<button onclick="window.location.href='editprofile.html'">
Edit Profile
</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgOUpPcqczVQdj4cqgosVwTVIK44QGCD0",
  authDomain: "uchat-c441e.firebaseapp.com",
  projectId: "uchat-c441e",
  storageBucket: "uchat-c441e.firebasestorage.app",
  messagingSenderId: "180429049903",
  appId: "1:180429049903:web:114d461e2a788f6363f6da"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("username").innerHTML =
      user.displayName || "UChat User";
    document.getElementById("email").innerHTML =
      user.email;
  } else {
    window.location.href = "login.html";
  }
});
  </script>
</body>
</html>
