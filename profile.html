<!DOCTYPE html>
<html>
<head>
<title>Profile - UChat</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.header{
    background:#1877F2;
    color:white;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
}

button{
    background:#1877F2;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
}
</style>

</head>

<body>

<div class="header">
Profile
</div>

<div class="card">
<img id="profileImage"
src="https://via.placeholder.com/120"
width="120"
height="120"
style="border-radius:50%;">

<h2>Umar</h2>

<p>Welcome to my UChat profile.</p>

<button onclick="window.location.href='editprofile.html'">
  Edit Profile
</button>

</div>
<script>
document.querySelector("h2").innerHTML =
localStorage.getItem("name") || "Umar";

document.querySelector("p").innerHTML =
localStorage.getItem("bio") || "Welcome to my UChat profile.";
</script>
</body>
</html>
