<!DOCTYPE html>
<html>
<head>
<title>Edit Profile - UChat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:#1877F2;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#1877F2;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
font-size:18px;
width:100%;
}

</style>

</head>

<body>

<div class="header">
Edit Profile
</div>

<div class="card">

<label>Profile Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Bio</label>
<textarea placeholder="Tell people about yourself"></textarea>

<label>Country</label>
<input type="text" placeholder="Nigeria">

<button onclick="saveProfile()">
Save Profile
</button>

</div>
<script>
function saveProfile(){

let name = document.querySelectorAll("input")[1].value;
let country = document.querySelectorAll("input")[2].value;
let bio = document.querySelector("textarea").value;

localStorage.setItem("name", name);
localStorage.setItem("country", country);
localStorage.setItem("bio", bio);

alert("Profile Saved!");

window.location.href = "profile.html";

}
            </script>
</body>
</html>
