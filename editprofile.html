<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Profile - UChat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:#1877F2;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#1877F2;
color:white;
border:none;
padding:12px;
border-radius:25px;
font-size:18px;
width:100%;
}
</style>
</head>

<body>

<div class="header">
Edit Profile
</div>

<div class="card">

<label>Profile Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Bio</label>
<textarea id="bio" placeholder="Tell people about yourself"></textarea>

<label>Country</label>
<input type="text" id="country" placeholder="Nigeria">

<button onclick="saveProfile()">Save Profile</button>

</div>

<script>
function saveProfile(){

let name = document.getElementById("name").value;
let bio = document.getElementById("bio").value;
let country = document.getElementById("country").value;

localStorage.setItem("name", name);
localStorage.setItem("bio", bio);
localStorage.setItem("country", country);

let photo = document.getElementById("photo").files[0];

if(photo){

let reader = new FileReader();

reader.onload = function(e){

localStorage.setItem("photo", e.target.result);

alert("Profile Saved!");

window.location.href = "profile.html";

};

reader.readAsDataURL(photo);

}else{

alert("Profile Saved!");

window.location.href = "profile.html";

}

}
</script>

</body>
</html>￼Enter
